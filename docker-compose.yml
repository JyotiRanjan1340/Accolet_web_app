version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: taxflow
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taxflow_gst
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes: [./backend:/app]
    ports: ["8000:8000"]
    env_file: ./backend/.env
    depends_on: [db, redis]

  frontend:
    image: nginx:alpine
    volumes: [./frontend:/usr/share/nginx/html:ro]
    ports: ["3000:80"]

volumes:
  pgdata:
